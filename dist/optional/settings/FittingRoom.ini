; Fitting Room - Data\SKSE\Plugins\FittingRoom.ini
;
; Starting settings: LORE-FRIENDLY (the Seamstone and its gold cost).
;
; The installer wrote this file for the playstyle you picked, and that is ALL
; it did: these are ordinary settings, not a mode. Every key below is also in
; the in-game panel (the FLICK sidebar, under Fitting Room), and the panel
; rewrites this file when you change something. Nothing is locked in, and the
; transmog itself works exactly the same either way.
;
; Full documentation: https://github.com/maartenharms/fitting-room

[General]
; Charge gold when you apply outfit changes, ESO-style: each changed slot
; costs iGoldPerSlot (below). Previewing is always free; you only pay when
; you commit. 1 = charge, 0 = free.
bUseGold=1

; Require the Seamstone in your pockets before the editor will open. The
; Seamstone is the lore item from FittingRoomLore.esp: a carryable Alteration
; focus sold by Farengar Secret-Fire in Dragonsreach, with the book "On the
; Outward Art" arriving in your inventory to point you at him. 1 = the stone
; is your key, so buy it before the hotkey does anything; 0 = the hotkey
; always opens the editor and the stone is just a second way in. With no
; FittingRoomLore.esp installed this key does nothing at all.
bRequireSeamstone=1

[Lore]
; Gold charged per changed slot while bUseGold=1.
iGoldPerSlot=100
